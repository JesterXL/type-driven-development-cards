<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>TDD Cards — Print Ready v2</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=IM+Fell+English:ital@0;1&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:#2a2a2a;font-family:'IM Fell English',Georgia,serif;padding:40px 20px}
h1{color:#c9a227;font-family:'Cinzel',serif;text-align:center;margin-bottom:6px;font-size:22px;letter-spacing:2px}
.subtitle{color:#888;text-align:center;font-family:'Cinzel',serif;font-size:10px;letter-spacing:1px;margin-bottom:32px}
.pair-label{color:#c9a227;font-family:'Cinzel',serif;font-size:11px;letter-spacing:1px;text-align:center;margin:32px 0 10px;text-transform:uppercase;opacity:.7}
.card-pair{display:flex;gap:32px;justify-content:center;margin-bottom:8px;flex-wrap:wrap}

/* Card shell — tarot ratio 2.75×4.75 */
.card{width:275px;height:475px;border-radius:12px;position:relative;font-family:'IM Fell English',Georgia,serif;overflow:hidden;display:flex;flex-direction:column;flex-shrink:0}
.card.good{box-shadow:0 4px 20px rgba(0,0,0,.3),0 0 0 2px #8B6914,0 0 0 4px #1a0e00,0 0 0 6px #c9a227;background:#f5e9c8;color:#2a1a04}
.card.bad{box-shadow:0 4px 20px rgba(0,0,0,.35),0 0 0 2px #7a1a1a,0 0 0 4px #0e0404,0 0 0 6px #b02020;background:#f0e4d0;color:#2a0a0a}

/* Header */
.card-header{padding:9px 11px 8px;display:flex;flex-direction:column;gap:4px;flex-shrink:0;position:relative}
.good .card-header{background:linear-gradient(180deg,#182e0e 0%,#2a5018 60%,#3a6824 100%);border-bottom:3px solid #8B6914}
.bad  .card-header{background:linear-gradient(180deg,#320606 0%,#5e1212 60%,#7e2020 100%);border-bottom:3px solid #6a1414}
.header-top{display:flex;justify-content:space-between;align-items:flex-start;gap:6px}
.title-text{font-family:'Cinzel',serif;font-size:17px;font-weight:700;line-height:1.15;color:#f2e8c0;letter-spacing:.2px;flex:1}
.mana-cost{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Cinzel',serif;font-size:13px;font-weight:700;flex-shrink:0;margin-top:1px}
.good .mana-cost{background:#c9a227;color:#1a0e00;border:2px solid #f0e4c0}
.bad  .mana-cost{background:#6a1414;color:#f5ddd0;border:2px solid #f0e4d0}
.sub-line{font-family:'Cinzel',serif;font-size:7px;font-weight:600;letter-spacing:1.1px;text-transform:uppercase;opacity:.85}
.good .sub-line{color:#bde08a}
.bad  .sub-line{color:#f0b0a0}
.tag-row{display:flex;gap:4px;flex-wrap:wrap}
.type-tag{font-family:'Cinzel',serif;font-size:6.5px;font-weight:600;letter-spacing:.7px;text-transform:uppercase;padding:2px 6px;border-radius:3px}
.good .type-tag{background:#1e3a10;color:#bde08a;border:1px solid #4a8a28}
.bad  .type-tag{background:#3a0808;color:#f0b0a0;border:1px solid #8a2020}

/* Art */
.card-art{flex:0 0 112px;overflow:hidden;margin:4px 7px 0;border-radius:5px}
.good .card-art{background:linear-gradient(155deg,#152c0c 0%,#275718 45%,#3f7028 80%,#2a5018 100%);border-top:2px solid #c9a227;border-bottom:3px solid #8B6914}
.bad  .card-art{background:linear-gradient(155deg,#180606 0%,#340e0e 45%,#501818 80%,#340e0e 100%);border-top:2px solid #b02020;border-bottom:3px solid #6a1414}
.art-svg{width:100%;height:100%;display:block}

/* Stat bar */
.stat-bar{height:24px;position:relative;flex-shrink:0}
.stat-bar svg{width:100%;height:100%;display:block}

/* Body */
.card-body{flex:1;padding:7px 11px 0;font-size:10.5px;line-height:1.5;display:flex;flex-direction:column;overflow:hidden}
.card-body p{margin:0 0 4px}
.code-block{font-family:'Fira Code',monospace;font-size:8.5px;padding:5px 8px;border-radius:4px;margin:4px 0;line-height:1.5;border-left:3px solid}
.good .code-block{background:#e2d090;border-left-color:#4a8030;color:#182410}
.bad  .code-block{background:#dfc0b8;border-left-color:#8a2020;color:#280808}
.flavour-rule{border:none;height:1px;margin:4px 0;opacity:.4;flex-shrink:0}
.good .flavour-rule{background:#c9a227}
.bad  .flavour-rule{background:#8a2020}

/* Bottom row */
.bottom-row{display:flex;align-items:stretch;gap:0;padding:4px 0 0;flex-shrink:0}
.flavour-col{flex:1;padding-right:7px;display:flex;flex-direction:column;justify-content:space-between}
.flavour-text{font-style:italic;font-size:9.5px;opacity:.72;line-height:1.4;margin:0}

/* Attribution — bad cards only */
.attribution{display:flex;align-items:center;justify-content:center;gap:4px;padding-top:4px;padding-bottom:6px}
.attribution .emoji{font-size:10px;opacity:.65;line-height:1}
.attribution span{font-family:'Cinzel',serif;font-size:7px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:#b06060;opacity:.6}

/* QR col — good cards only */
.qr-col{flex-shrink:0;width:64px;display:flex;flex-direction:column;align-items:center;gap:3px;padding-left:5px}
.qr-generated{width:50px;height:50px;border-radius:4px;overflow:hidden;border:1.5px solid rgba(139,105,20,.5);background:white;display:flex;align-items:center;justify-content:center}
.qr-generated canvas,.qr-generated img{width:46px!important;height:46px!important}
.qr-label{font-family:'Cinzel',serif;font-size:5.5px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;color:#6b4a10}

/* Corner deco */
.cdeco{position:absolute;font-size:11px;opacity:.12;pointer-events:none;font-family:serif}
.cdeco.tl{top:5px;left:7px}.cdeco.tr{top:5px;right:7px}
.cdeco.bl{bottom:5px;left:7px}.cdeco.br{bottom:5px;right:7px}

/* Print */
@media print{
  body{background:white;padding:0;margin:0}
  h1,.subtitle,.pair-label{display:none}
  .card-pair{display:contents}
  .card{width:3in;height:5in;border-radius:0;page-break-after:always;break-after:page;margin:0;box-shadow:none!important;position:relative}
  .card::before{content:'';position:absolute;top:.125in;left:.125in;right:.125in;bottom:.125in;border:.5pt dashed rgba(0,0,0,.15);pointer-events:none;z-index:999}
  .card-pair:last-child .card:last-child{page-break-after:avoid;break-after:avoid}
  @page{size:3in 5in;margin:0}
}
</style>
</head>

          <div class="qr-generated" id="qr-${id}"></div>
          <div class="qr-label">Learn More</div>

    </div>

}

          <div class="attribution"><span class="emoji">🃏</span><span>jessewarden.com</span></div>

      </div>
    </div>
  </div>`;
}

  return `<div class="pair-label">${label}</div><div class="card-pair">${frontHtml}${backHtml}</div>`;

function generateQR() {
  qrUrls.forEach(item => {
    const el = document.getElementById('qr-' + item.id);
    if (!el) return;
    el.innerHTML = '';
    try {
      new QRCode(el, {
        text: item.url,
        width: 46, height: 46,
        colorDark: '#111111',
        colorLight: '#ffffff',
        correctLevel: QRCode.CorrectLevel.M
      });
    } catch(e) {
      el.textContent = 'QR';
      el.style.fontSize = '7px';
    }
  });
}

if (document.readyState === 'complete') {
  setTimeout(generateQR, 400);
} else {
  window.addEventListener('load', () => setTimeout(generateQR, 400));
}
</script>
